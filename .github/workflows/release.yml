name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install claude-code-sdk

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build .app bundle
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          APP="Claude Management.app"
          CONTENTS="$APP/Contents"

          # Create bundle structure
          mkdir -p "$CONTENTS/MacOS"
          mkdir -p "$CONTENTS/Resources"

          # Generate icns from icon.png
          ICONSET=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET"
          for size in 16 32 128 256 512; do
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${size}x${size}.png" > /dev/null
          done
          for size in 32 64 256 512 1024; do
            half=$((size / 2))
            sips -z $size $size assets/icon.png --out "$ICONSET/icon_${half}x${half}@2x.png" > /dev/null 2>&1 || true
          done
          iconutil -c icns "$ICONSET" -o "$CONTENTS/Resources/AppIcon.icns"

          # Create Info.plist
          cat > "$CONTENTS/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key>
              <string>Claude Management</string>
              <key>CFBundleDisplayName</key>
              <string>Claude Management</string>
              <key>CFBundleIdentifier</key>
              <string>com.hire2hero.claude-management</string>
              <key>CFBundleVersion</key>
              <string>${VERSION}</string>
              <key>CFBundleShortVersionString</key>
              <string>${VERSION}</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleExecutable</key>
              <string>launcher</string>
              <key>CFBundleIconFile</key>
              <string>AppIcon</string>
              <key>LSMinimumSystemVersion</key>
              <string>12.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          PLIST

          # Create launcher script
          cat > "$CONTENTS/MacOS/launcher" << 'LAUNCHER'
          #!/bin/bash
          source ~/.zprofile 2>/dev/null
          source ~/.zshrc 2>/dev/null

          APP_DIR="$(cd "$(dirname "$0")/.." && pwd)"
          RESOURCES="$APP_DIR/Resources"

          # Use bundled Python venv if it exists, otherwise find system python3
          if [ -d "$RESOURCES/venv" ]; then
            source "$RESOURCES/venv/bin/activate"
            PYTHON="$RESOURCES/venv/bin/python3"
          else
            PYTHON="$(command -v python3.13 || command -v python3)"
          fi

          cd "$RESOURCES/app"
          exec "$PYTHON" main.py "$@"
          LAUNCHER
          chmod +x "$CONTENTS/MacOS/launcher"

          # Copy application code
          mkdir -p "$CONTENTS/Resources/app"
          rsync -a --exclude='.git' --exclude='__pycache__' --exclude='.pytest_cache' \
                   --exclude='*.pyc' --exclude='tests' --exclude='Claude Management.app' \
                   --exclude='.github' --exclude='*.log' --exclude='*.db' \
                   --exclude='*.db-shm' --exclude='*.db-wal' --exclude='config.json' \
                   --exclude='state.json*' --exclude='session_history.migrated' \
                   --exclude='session_summaries.migrated' \
                   . "$CONTENTS/Resources/app/"

          # Create bundled venv with dependencies
          python -m venv "$CONTENTS/Resources/venv"
          "$CONTENTS/Resources/venv/bin/pip" install --quiet claude-code-sdk

          # Ad-hoc codesign
          codesign --force --deep --sign - "$APP"

          echo "Built $APP ($VERSION)"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          DMG_NAME="Claude-Management-${VERSION}.dmg"

          # Create a temporary directory for DMG contents
          DMG_DIR=$(mktemp -d)
          cp -R "Claude Management.app" "$DMG_DIR/"

          # Create a symlink to /Applications for drag-install
          ln -s /Applications "$DMG_DIR/Applications"

          # Build DMG
          hdiutil create -volname "Claude Management" \
                         -srcfolder "$DMG_DIR" \
                         -ov -format UDZO \
                         "$DMG_NAME"

          echo "dmg_name=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"

          # Create tag if workflow_dispatch
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git tag "$VERSION" || true
            git push origin "$VERSION" || true
          fi

          gh release create "$VERSION" \
            --title "Claude Management $VERSION" \
            --generate-notes \
            "${{ env.dmg_name }}"
